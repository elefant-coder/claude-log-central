version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: claude_logs
      POSTGRES_USER: claude
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-claude_logs_secret_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U claude -d claude_logs"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8100:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://claude:${POSTGRES_PASSWORD:-claude_logs_secret_2026}@postgres:5432/claude_logs
      ANTHROPIC_API_URL: https://api.anthropic.com
      ADMIN_API_KEY: ${ADMIN_API_KEY:-clc_admin_key_change_me}
      CORS_ORIGINS: '["http://localhost:3100","https://claude-log-central.vercel.app"]'
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    ports:
      - "3100:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8100
    depends_on:
      - backend

volumes:
  postgres_data:
